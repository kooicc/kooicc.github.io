baseURL: "https://kooicc.github.io/"
title: 秋雨夜眠
copyright: "©1996 - 2025 秋雨夜眠的Blog"
pagination:
  pagerSize: 10
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true

languages:
  zh:
    languageName: "博客"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: 搜索
          url: search/
          weight: 5
        - name: 分类
          url: categories/
          weight: 10
        - name: 标签
          url: tags/
          weight: 10
  fr:
    languageName: "主页"
    weight: 2
    title: 秋雨夜眠
#    menu:
#      main:
#        - name: DXP4800
#          url: https://koicc.cn16.ug.link/desktop/#/login/account
#          target: "_blank"  
#          weight: 5

    params:
      languageAltTitle: 博客
      profileMode:
        enabled: true
        title: PaperMod
        imageUrl: "https://raw.githubusercontent.com/googlefonts/noto-emoji/master/svg/emoji_u1f9d1_1f3fb_200d_1f4bb.svg"
        imageTitle: ProfileMode 图片
        subtitle: "☄️ 快速 | ☁️ 流畅 | 🌙 平滑 | 📱 响应式"
        buttons:
          - name: 博客
            url: /
          - name: Profile Mode
            url: https://github.com/adityatelange/hugo-PaperMod/wiki/Features#profile-mode

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "hugo-Blog"
  author: subtitle: "☁️ "
  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: false
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  images: ["images/papermod-cover.png"]

  profileMode:
    enabled: true
    title: PaperMod
    imageUrl: "#"
    imageTitle: 我的图片
    buttons:
      - name: 归档
        url: archives
      - name: 标签
        url: tags

  homeInfoParams:
    Content: >

  socialIcons:
    - name: github
      title: 查看 GitHub 源代码
      url: "https://github.com/adityatelange/hugo-PaperMod"
    - name: Discord
      title: 加入 Discord 社区
      url: "https://discord.gg/ahpmTvhVmp"
    - name: X
      title: 在 X/Twitter 上分享 PaperMod
      url: "https://x.com/intent/tweet/?text=Checkout%20Hugo%20PaperMod%20%E2%9C%A8%0AA%20fast,%20clean,%20responsive%20Hugo%20theme.&url=https://github.com/adityatelange/hugo-PaperMod&hashtags=Hugo,PaperMod"
    - name: KoFi
      title: 购买我一杯 Ko-Fi :)
      url: "https://ko-fi.com/adityatelange"





  assets:
    disableHLJS: false
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

defaultContentLanguage: "zh" # 默认内容语言设置为中文
