baseURL: "https://kooicc.github.io/"
title: "秋雨夜眠的Blog"
copyright: "©1996 - 2025"
pagination:
  pagerSize: 10
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true

languages:
  zh:
    languageName: "博客"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: 搜索
          url: search/
          weight: 5
        - name: 分类
          url: categories/
          weight: 10
        - name: 标签
          url: tags/
          weight: 10
  fr:
    languageName: "主页"
    weight: 2
    title:
#    menu:
#      main:
#        - name: DXP4800
#          url: https://koicc.cn16.ug.link/desktop/#/login/account
#          target: "_blank"  
#          weight: 5

    params:
      languageAltTitle: 博客
      profileMode:
        enabled: true
        title: Gentoo
        imageUrl: "https://s3.bmp.ovh/imgs/2023/11/17/d155cee23d2cfc0a.jpg"
        imageTitle: 夜
        subtitle:
        buttons:
          - name: Hi
            url: /

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "hugo-Blog"
  author: "☁️ "
  defaultTheme: auto
  ShowShareButtons: false
  ShowReadingTime: false
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  searchHidden: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: false
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  images: ["images/papermod-cover.png"]

  profileMode:
    enabled: false
    imageUrl: "#"
    imageTitle: 我的图片
    buttons:
      - name: 归档
        url: archives
      - name: 标签
        url: tags

  homeInfoParams:
    Content: >
      山极远碧云合，清夜一声白雪微。
      欲寄相思千里月，溪边残照雨霏霏。
      "/images/hugo.svg"

  assets:
    disableHLJS: false
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

defaultContentLanguage: "zh" # 默认内容语言设置为中文
