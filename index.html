<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BI4BOB 业余无线电台 QSO 通联日志">
  <meta name="theme-color" content="#031428">
  <title>BI4BOB ·</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <div class="grid-horizon"></div>
  </div>

  <main class="app-shell">
    <header class="hero">
      <a class="brand" href="#" aria-label="BI4BOB 首页">
        <span class="brand-copy">
          <strong>BI4BOB</strong>
          <small id="brandClock">--:--:--</small>
        </span>
      </a>

      <div class="hero-title">
        <h1>
          中华人民共和国个人业余无线电台
          <small>PERSONAL AMATEUR RADIO STATION OF P.R.CHINA</small>
        </h1>
      </div>
    </header>

    <section class="log-panel" aria-labelledby="logTitle">
      <div class="panel-head">
        <div>
          <p class="eyebrow">RADIO CONTACT RECORDS</p>
          <h2 id="logTitle">QSO 通联日志</h2>
        </div>

        <div class="panel-head-actions">
          <button id="toggleLogBtn" class="toggle-log-btn" type="button">
            <span class="btn-icon" aria-hidden="true">▼</span>
            <span class="btn-label">展开日志</span>
          </button>

          <label class="search-box" for="callsignSearch">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m2.35-5.65a8 8 0 1 1-16 0 8 8 0 0 1 16 0Z"/></svg>
            <input id="callsignSearch" type="search" placeholder="搜索呼号、频段、模式、位置等" autocomplete="off">
            <kbd>SEARCH</kbd>
          </label>
        </div>
      </div>

      <!-- 日志表格折叠容器 -->
      <div id="logContainer" class="log-container collapsed">
        <div class="table-frame">
          <table>
            <thead>
              <tr>
                <th>时间 <small>DATE / TIME</small></th>
                <th>呼号 <small>CALLSIGN</small></th>
                <th>频段 <small>BAND</small></th>
                <th>模式 <small>MODE</small></th>
                <th>信号 <small>RST</small></th>
                <th>位置 <small>QTH</small></th>
                <th>备注 <small>REMARKS</small></th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" hidden>
            <span>⌁</span>
            <strong>未找到匹配的记录</strong>
            <small>请尝试输入其他关键字</small>
          </div>
        </div>

        <div class="panel-footer">
          <p>已显示 <strong id="rangeInfo">0–0</strong> 条，共 <strong id="totalInfo">0</strong> 条通联记录</p>
          <nav class="pagination" aria-label="通联日志分页">
            <button id="prevBtn" type="button" aria-label="上一页">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
              上一页
            </button>
            <span id="pageInfo">01 / 01</span>
            <button id="nextBtn" type="button" aria-label="下一页">
              下一页
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </nav>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      <span class="footer-dot"></span>
      <span>Callsign: BI4BOB</span>
      <i></i>
      <span>QTH: Shanghai, China</span>
      <i></i>
      <span>每一次通联，都是电波跨越山海的相遇。</span>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
