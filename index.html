<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;

body{
    font-family:"Microsoft YaHei","Segoe UI",sans-serif;
    background:linear-gradient(180deg,#03132f 0%,#072654 45%,#0b3c73 100%);

    overflow-x:hidden;
}

#stars{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:-2;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:50px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:58px;
    color:#b8ecff;
    text-shadow:0 0 20px rgba(80,180,255,.5);
    letter-spacing:2px;
    font-weight:900;
}

.divider{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:30px 0;
}

.divider:before,
.divider:after{
    content:"";
    height:1px;
    background:rgba(255,255,255,.35);
    flex:1;
}

.divider span{
    padding:0 18px;
    color:#9fdcff;
    font-size:20px;
}

.card{
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:28px;
    padding:22px;
    box-shadow:0 15px 45px rgba(0,0,0,.35);
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:18px;
}

thead{
    background:#0d4ea5;
}

th{
    padding:18px 10px;
    font-size:28px;
    font-weight:bold;
    border:1px solid rgba(255,255,255,.12);
}

td{
    padding:22px 12px;
    font-size:22px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
}

tbody tr:hover{
    background:rgba(255,255,255,.06);
}

.band{
    display:inline-block;
    background:#2b9fff;
    padding:8px 18px;
    border-radius:10px;
    font-weight:bold;
}

.mode{
    color:#69beff;
    font-weight:bold;
}

.rst{
    color:#ffd84b;
    font-weight:bold;
}

.middle{
    text-align:center;
    margin:45px 0 25px;
    font-size:42px;
    color:#ffffff;
    letter-spacing:2px;
}

.footer{
    text-align:center;
    padding:35px 15px;
    color:#dcdcdc;
    font-size:22px;
}

@media(max-width:768px){

.header h1{
    font-size:32px;
}

th{
    font-size:15px;
}

td{

}

.middle{
    font-size:24px;
}

.footer{
    font-size:15px;

</style>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="header">

<h1>📡 业余无线电台通联日志（QSO）</h1>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];
let shootingStars = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    stars = [];

    for (let i = 0; i < 220; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.3,
            a: Math.random(),
            v: Math.random() * 0.3 + 0.05
        });
    }
}

function createShootingStar() {

    shootingStars.push({

        x: Math.random() * canvas.width,

        y: Math.random() * canvas.height * 0.35,

        len: Math.random() * 120 + 80,

        speed: Math.random() * 12 + 10,

        life: 0

    });

}

setInterval(createShootingStar, 5000);

function drawBackground() {

    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{

        ctx.beginPath();

        ctx.fillStyle="rgba(255,255,255,"+star.a+")";

        ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

        ctx.fill();

        star.y+=star.v;

        if(star.y>canvas.height){

            star.y=0;

            star.x=Math.random()*canvas.width;

        }

    });

    for(let i=shootingStars.length-1;i>=0;i--){

        let s=shootingStars[i];

        ctx.beginPath();

        let g=ctx.createLinearGradient(
            s.x,
            s.y,
            s.x+s.len,
            s.y+s.len*0.35
        );

        g.addColorStop(0,"rgba(255,255,255,1)");
        g.addColorStop(1,"rgba(255,255,255,0)");

        ctx.strokeStyle=g;

        ctx.lineWidth=2;

        ctx.moveTo(s.x,s.y);

        ctx.lineTo(
            s.x+s.len,
            s.y+s.len*0.35
        );

        ctx.stroke();

        s.x+=s.speed;

        s.y+=s.speed*0.35;

        s.life++;

        if(s.life>40){

            shootingStars.splice(i,1);

        }

    }

    requestAnimationFrame(drawBackground);

}

resize();

drawBackground();

window.addEventListener("resize",resize);

</script>

</body>
