<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 · 秋雨夜眠</title>
    <style>
        /* 全局重置，保持极简干净 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            line-height: 1.6;
        }

        .container {
            max-width: 780px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 2.8rem 3rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            border: 1px solid #eaeef2;
        }

        /* 标题区 — 与 "Gentoo'Docker" 风格呼应 */
        .site-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 1.2rem;
            border-bottom: 2px solid #eef2f6;
        }

        .site-title {
            font-size: 2rem;
            font-weight: 550;
            letter-spacing: -0.5px;
            color: #1e2a36;
        }

        .site-title .accent {
            color: #4a6a8b;
        }

        .site-sub {
            font-size: 0.95rem;
            color: #6b7f92;
            background: #f0f4f8;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 450;
        }

        /* 通用排版 */
        h2 {
            font-size: 1.3rem;
            font-weight: 550;
            margin: 2rem 0 0.8rem;
            color: #1e2a36;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2:first-of-type {
            margin-top: 0.2rem;
        }

        p {
            margin-bottom: 1rem;
            color: #34495e;
        }

        a {
            color: #2c6b9e;
            text-decoration: none;
            border-bottom: 1.5px dotted #cbd8e6;
            transition: border-color 0.2s, color 0.2s;
        }

        a:hover {
            border-bottom-color: #2c6b9e;
            color: #1a4b73;
        }

        hr {
            border: none;
            border-top: 2px solid #eef2f6;
            margin: 2rem 0 1.5rem;
        }

        /* 标签列表 */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1.2rem;
            margin: 0.2rem 0 0.8rem;
            padding: 0.4rem 0;
        }

        .tag-item {
            font-size: 0.98rem;
            background: #f0f4f8;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: #2c3e50;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .tag-item img {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            border-radius: 2px;
        }

        /* 影视卡片网格 */
        .media-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin: 0.8rem 0 0.2rem;
        }

        .media-card {
            flex: 1 1 160px;
            min-width: 130px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 0.6rem 0.6rem 0.4rem;
            text-align: center;
            border: 1px solid #eef2f6;
            transition: background 0.15s;
        }

        .media-card:hover {
            background: #f0f4f8;
        }

        .media-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            border-radius: 12px;
            background: #dce3eb;
            display: block;
        }

        .media-card .caption {
            font-size: 0.88rem;
            margin-top: 0.4rem;
            color: #2c3e50;
        }

        /* 页脚 */
        .footer-note {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #eef2f6;
            font-size: 0.9rem;
            color: #6b7f92;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 0.8rem 1.8rem;
            flex-wrap: wrap;
        }

        .footer-note span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .container {
                padding: 1.8rem 1.2rem;
                border-radius: 18px;
            }
            .site-title {
                font-size: 1.7rem;
            }
            .media-grid {
                gap: 0.8rem;
            }
            .media-card {
                flex: 1 1 120px;
                min-width: 100px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 1rem 0.8rem;
            }
            .media-card {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
